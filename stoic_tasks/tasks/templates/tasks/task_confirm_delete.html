{% extends 'base.html' %}

{% block content %}
<div class="bg-white shadow sm:rounded-lg max-w-md mx-auto mt-12">
    <div class="px-4 py-5 sm:p-6 text-center">
        <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">
            Supprimer la tâche ?
        </h3>
        <div class="mt-2 max-w-xl text-sm text-gray-500 mb-6">
            <p>Êtes-vous sûr de vouloir supprimer la tâche "<strong>{{ object.subject }}</strong>" ? Cette action est irréversible.</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-center gap-4">
                <a href="{% url 'task_list' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Annuler
                </a>
                <button type="submit" class="bg-red-600 border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:bg-red-700">
                    Confirmer la suppression
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
