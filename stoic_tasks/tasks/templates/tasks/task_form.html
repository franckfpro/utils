{% extends 'base.html' %}

{% block content %}
<div class="bg-white shadow px-4 py-5 sm:rounded-lg sm:p-6 max-w-2xl mx-auto">
    <div class="md:grid md:grid-cols-1 md:gap-6">
        <div class="mt-5 md:mt-0">
            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Créer une nouvelle tâche</h3>
            <form action="" method="POST">
                {% csrf_token %}
                <div class="grid grid-cols-6 gap-6">
                    {% for field in form %}
                    <div class="col-span-6 {% if field.name == 'start_date' or field.name == 'end_date' %}sm:col-span-3{% endif %}">
                        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">
                            {{ field.label }}
                        </label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="mt-2 text-sm text-red-600">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                <div class="mt-6 flex justify-end">
                    <a href="{% url 'task_list' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none mr-3">
                        Annuler
                    </a>
                    <button type="submit" class="bg-slate-800 border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:bg-slate-700 focus:outline-none">
                        Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
